# Database (Render / Aiven)
spring.datasource.url=${SPRING_DATASOURCE_URL:NOT_FOUND}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:NOT_FOUND}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:NOT_FOUND}

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server port for Render
server.port=${PORT:8080}

# Gmail OTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true